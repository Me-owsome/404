<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Google Docs</title>
    <link rel="icon" href="https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico">
    <style>
        body { margin: 0; background: #4db8ff; font-family: 'Arial', sans-serif; text-align: center; color: white; overflow: hidden; user-select: none; }
        canvas { background: #4db8ff; display: block; margin: 0 auto; cursor: pointer; border-bottom: 4px solid #fff; }
        .ui-overlay { position: absolute; top: 10px; width: 100%; display: flex; justify-content: center; gap: 40px; font-size: 22px; font-weight: bold; text-shadow: 2px 2px #000; pointer-events: none; }
        .menu-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); padding: 20px; border-radius: 15px; display: none; border: 3px solid #fff; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #ffcc00; border: none; border-radius: 5px; font-weight: bold; margin: 5px; }
        #msg { font-size: 30px; color: #ffcc00; margin-bottom: 10px; }
    </style>
</head>
<body onload="init()">
    <div class="ui-overlay">
        <div>RUN LVL: <span id="lvl">1</span></div>
        <div>COINS: <span id="coins">0</span></div>
        <div>WORLD RANK: <span id="rank">#100</span></div>
    </div>

    <div id="menu" class="menu-overlay">
        <div id="msg">TRAINING COMPLETE!</div>
        <button onclick="restart()">Train Again</button>
    </div>

    <canvas id="g"></canvas>
    <p style="position:fixed; bottom:10px; width:100%;">Click to Jump! Reach Level 100 to enter the <b>World Championship</b>.</p>

    <script>
        const canvas = document.getElementById("g");
        const ctx = canvas.getContext("2d");
        
        // Auto-resize to fit the iframe perfectly
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight - 50;
        }
        window.onresize = resize;
        resize();

        let duck = { x: 100, y: 0, w: 55, h: 55, vy: 0, g: 0.7, jump: -15, anim: 0 };
        let obstacles = [];
        let coins = 0;
        let level = 1;
        let frame = 0;
        let active = true;
        let speed = 8;
        let floorY = canvas.height - 100;

        function drawDuck() {
            duck.anim += 0.15;
            let bob = Math.sin(duck.anim) * 4;
            ctx.save();
            ctx.translate(duck.x, duck.y + bob);
            
            // DL2 Specific Yellow Body
            ctx.fillStyle = "#ffff00";
            ctx.beginPath();
            ctx.ellipse(28, 35, 28, 22, 0, 0, Math.PI * 2); ctx.fill(); // Body
            ctx.beginPath();
            ctx.arc(40, 18, 20, 0, Math.PI * 2); ctx.fill(); // Head
            
            // Wing (DL2 Style)
            ctx.fillStyle = "#ffd600";
            ctx.beginPath();
            ctx.ellipse(18, 38, 15, 10, 0.3, 0, Math.PI * 2); ctx.fill();
            
            // Eye
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(48, 12, 6, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(50, 12, 3, 0, Math.PI * 2); ctx.fill();
            
            // Orange Beak
            ctx.fillStyle = "#ff8000";
            ctx.beginPath();
            ctx.moveTo(55, 15); ctx.lineTo(75, 22); ctx.lineTo(55, 30); ctx.fill();
            
            ctx.restore();
        }

        function loop() {
            if(!active) return;
            floorY = canvas.height - 100;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            frame++;

            // Scrolling Ground (DL2 Blue/Green theme)
            ctx.fillStyle = "#47d147"; ctx.fillRect(0, floorY, canvas.width, 100);
            ctx.fillStyle = "#339933"; ctx.fillRect(0, floorY, canvas.width, 8);

            // Duck Physics
            duck.vy += duck.g;
            duck.y += duck.vy;
            if (duck.y > floorY - 55) { duck.y = floorY - 55; duck.vy = 0; }

            // Obstacles (Training Rocks)
            if (frame % Math.max(25, 80 - level) === 0) {
                obstacles.push({ x: canvas.width + 50, y: floorY - 40, w: 40, h: 40 });
            }

            obstacles.forEach((o, i) => {
                o.x -= speed;
                // Draw Rock
                ctx.fillStyle = "#808080";
                ctx.beginPath();
                ctx.moveTo(o.x, o.y + 40); ctx.lineTo(o.x + 20, o.y); ctx.lineTo(o.x + 40, o.y + 40);
                ctx.fill();

                // Collision
                if (duck.x < o.x + o.w - 10 && duck.x + 45 > o.x + 10 && duck.y < o.y + o.h && duck.y + 45 > o.y) {
                    gameOver();
                }

                if (o.x < -100) {
                    obstacles.splice(i, 1);
                    coins += 2;
                    level++;
                    speed += 0.05;
                    updateUI();
                }
            });

            drawDuck();
            requestAnimationFrame(loop);
        }

        function updateUI() {
            document.getElementById('lvl').innerText = Math.floor(level/5) + 1;
            document.getElementById('coins').innerText = coins;
            document.getElementById('rank').innerText = "#" + Math.max(1, 100 - Math.floor(level/10));
        }

        function gameOver() {
            active = false;
            document.getElementById('menu').style.display = "block";
        }

        function restart() {
            obstacles = [];
            active = true;
            duck.y = 0;
            document.getElementById('menu').style.display = "none";
            loop();
        }

        window.onclick = () => { if (duck.y >= floorY - 60) duck.vy = duck.jump; };
        document.addEventListener('keydown', (e) => {
            if (e.code === "Space" && duck.y >= floorY - 60) duck.vy = duck.jump;
            if (e.key === "Escape") window.location.replace("https://classroom.google.com");
        });

        loop();

        // Tab Cloaking
        setInterval(() => { document.title = "Google Docs"; }, 100);
    </script>
</body>
</html>
