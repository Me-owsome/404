<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tab-title">Google Docs</title>
    <link id="tab-icon" rel="icon" href="https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico">
    
    <style>
        :root { 
            --bg: #0b0b0b; 
            --side: #121212; 
            --accent: #4CAF50; 
            --text: #efefef; 
            --card: #1e1e1e; 
            --border: #333;
            --input-bg: #000;
        }

        [data-theme="light"] {
            --bg: #f0f2f5;
            --side: #ffffff;
            --accent: #2e7d32;
            --text: #1a1a1a;
            --card: #ffffff;
            --border: #ddd;
            --input-bg: #fff;
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; display: flex; }
        body { font-family: 'Segoe UI', sans-serif; color: var(--text); }

        #sidebar { width: 260px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px 10px; flex-shrink: 0; overflow-y: auto; }
        .side-btn { background: none; border: none; color: var(--text); opacity: 0.7; text-align: left; padding: 12px; cursor: pointer; border-radius: 8px; font-size: 14px; margin-bottom: 5px; width: 100%; }
        .side-btn:hover, .side-btn.active { background: var(--border); opacity: 1; color: var(--accent); }
        h2 { font-size: 11px; color: #888; text-transform: uppercase; margin: 15px 0 8px 10px; letter-spacing: 1px; }

        .config-box { padding: 12px; background: var(--card); border-radius: 10px; border: 1px solid var(--border); margin-bottom: 10px; }
        .config-input { width: 100%; padding: 8px; margin-bottom: 8px; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); border-radius: 4px; font-size: 11px; outline: none; }
        .config-save-btn { width: 100%; padding: 8px; background: var(--accent); border: none; color: white; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; }

        #main { display: flex; flex-direction: column; flex-grow: 1; height: 100vh; position: relative; }
        #top-nav { height: 60px; background: var(--side); padding: 0 20px; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        #search { flex-grow: 1; background: var(--card); border: 1px solid var(--border); padding: 10px; border-radius: 6px; color: var(--text); outline: none; }
        
        /* New Toggle Button - Hidden by default */
        .fs-toggle-btn { background: var(--accent); color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; display: none; }

        #content-area { flex-grow: 1; overflow-y: auto; padding: 20px; }
        #game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .game-card { background: var(--card); border: 1px solid var(--border); padding: 25px 10px; border-radius: 12px; cursor: pointer; text-align: center; font-size: 14px; font-weight: bold; min-height: 80px; display: flex; align-items: center; justify-content: center; color: var(--text); transition: 0.2s; }
        .game-card:hover { border-color: var(--accent); transform: translateY(-3px); }

        #player-container { 
            display: none; 
            flex-grow: 1;
            background: black; 
        }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body onload="init()">

    <div id="sidebar">
        <h1 style="color:var(--accent); margin-left:10px; font-size:22px; margin-bottom:20px;">Project 404</h1>
        <button id="home-btn" class="side-btn active" onclick="goHome()">Home</button>
        
        <div class="config-box">
            <h2>Appearance</h2>
            <button class="config-save-btn" style="background:#555;" onclick="toggleTheme()">Switch Light/Dark Mode</button>
        </div>

        <div class="config-box">
            <h2>History Runner</h2>
            <button class="config-save-btn" style="background:#673AB7;" onclick="runHistoryCloak()">Open in Blank Tab</button>
        </div>

        <div class="config-box">
            <h2>Personal Records</h2>
            <textarea id="records-input" class="config-input" style="height: 60px; resize: none;" placeholder="Record notes..."></textarea>
            <button class="config-save-btn" style="background:#2196F3;" onclick="saveRecords()">Save Records</button>
        </div>

        <div class="config-box">
            <h2>Tab Settings</h2>
            <input type="text" id="cloak-name" class="config-input" placeholder="Custom Tab Name">
            <input type="text" id="cloak-url" class="config-input" placeholder="Icon URL">
            <input type="text" id="panic-url-input" class="config-input" placeholder="Panic URL">
            <button class="config-save-btn" onclick="saveSettings()">Save Settings</button>
        </div>
    </div>

    <div id="main">
        <div id="top-nav">
            <input type="text" id="search" placeholder="Search for games..." oninput="renderGames()">
            <button id="fs-btn" class="fs-toggle-btn" onclick="toggleFullScreen()">Type Panic</button>
        </div>

        <div id="content-area">
            <div id="game-grid"></div>
        </div>

        <div id="player-container">
            <iframe id="game-view" src="" allow="autoplay; fullscreen; keyboard"></iframe>
        </div>
    </div>

    <script>
        const gameList = [
            { name: "Bloons TD", path: "./games/bloonstd/index.html" },
            { name: "Geo Dash", path: "./games/geodash/index.html" },
            { name: "Duck Life 3", path: "./games/ducklife3/index.html" },
            { name: "Drift Boss", path: "./games/drift-boss/index.html" },
            { name: "Slope", path: "./games/slope/index.html" },
            { name: "2048", path: "./games/2048/index.html" },
            { name: "World's Hardest Game", path: "./games/worlds-hardest-game/index.html" },
            { name: "Flappy Bird", path: "./games/flappybird/index.html" },
            { name: "Bloons TD 2", path: "./games/bloonstd2/index.html" },
            { name: "Sand", path: "./games/Sand.html" },
            { name: "Basket Random", path: "./games/basket-random/index.html" },
            { name: "Drive Mad", path: "./games/drive-mad/index.html" },
            { name: "1v1 LOL", path: "./games/1v1lol/index.html" },
            { name: "Big Tower Tiny Square", path: "./BTTS/index.html" },
            { name: "Vex 7", path: "./games/vex7/index.html" },
            { name: "MOTOX3M POOL", path: "./games/motox3m-pool/index.html" },
            { name: "OVO", path: "./games/OVO/index.html" },
            { name: "Big Neon Tower Tiny Square", path: "./games/BNTTS/index.html" },
            { name: "Cookie Clicker", path: "./CC/index.html" }
        ];

        let typedBuffer = "";
        const panicWord = "PANIC";

        function launchGame(path) {
            document.getElementById('content-area').style.display = 'none';
            document.getElementById('player-container').style.display = 'block';
            document.getElementById('fs-btn').style.display = 'block';
            document.getElementById('game-view').src = path;
        }

        function toggleFullScreen() {
            const player = document.getElementById('player-container');
            if (!document.fullscreenElement) {
                player.requestFullscreen().catch(e => console.error(e));
            } else {
                document.exitFullscreen();
            }
        }

        function goHome() {
            if (document.fullscreenElement) document.exitFullscreen();
            document.getElementById('game-view').src = '';
            document.getElementById('player-container').style.display = 'none';
            document.getElementById('content-area').style.display = 'block';
            document.getElementById('fs-btn').style.display = 'none';
            typedBuffer = "";
        }

        function panic() { 
            const saved = localStorage.getItem('jettSettings');
            const data = saved ? JSON.parse(saved) : { panic: "https://classroom.google.com" };
            window.top.location.replace(data.panic.startsWith('http') ? data.panic : 'https://' + data.panic);
        }

        // Key Listener for PANIC word
        document.addEventListener('keydown', (e) => { 
            typedBuffer += e.key.toUpperCase();
            if (typedBuffer.endsWith(panicWord)) {
                panic();
            }
            if (typedBuffer.length > 10) typedBuffer = typedBuffer.slice(-5);
        });

        function renderGames() {
            const grid = document.getElementById('game-grid');
            const term = document.getElementById('search').value.toLowerCase();
            grid.innerHTML = '';
            gameList.filter(g => g.name.toLowerCase().includes(term)).forEach(g => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerText = g.name;
                card.onclick = () => launchGame(g.path);
                grid.appendChild(card);
            });
        }

        function toggleTheme() {
            const current = document.body.getAttribute('data-theme');
            const target = current === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', target);
            localStorage.setItem('jettTheme', target);
        }

        function loadTheme() {
            const saved = localStorage.getItem('jettTheme') || 'dark';
            document.body.setAttribute('data-theme', saved);
        }

        function saveRecords() {
            localStorage.setItem('jettRecords', document.getElementById('records-input').value);
        }

        function loadRecords() {
            const saved = localStorage.getItem('jettRecords');
            if (saved) document.getElementById('records-input').value = saved;
        }

        function saveSettings() {
            const settings = {
                title: document.getElementById('cloak-name').value || "Google Docs",
                icon: document.getElementById('cloak-url').value || "https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico",
                panic: document.getElementById('panic-url-input').value || "https://classroom.google.com"
            };
            localStorage.setItem('jettSettings', JSON.stringify(settings));
            applySettings();
            alert("Settings saved.");
        }

        function applySettings() {
            const saved = localStorage.getItem('jettSettings');
            const data = saved ? JSON.parse(saved) : { title: "Google Docs", icon: "https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico" };
            document.title = data.title;
            let link = document.querySelector("link[rel*='icon']") || document.createElement('link');
            link.rel = 'shortcut icon'; link.href = data.icon;
            if (!document.querySelector("link[rel*='icon']")) document.head.appendChild(link);
        }

        function init() {
            renderGames();
            applySettings();
            loadRecords();
            loadTheme();
            setInterval(applySettings, 1000);
        }

        function runHistoryCloak() {
            const url = window.location.href;
            const win = window.open('about:blank', '_blank');
            if (!win) { alert("Allow popups!"); return; }
            const doc = win.document;
            const iframe = doc.createElement('iframe');
            doc.title = document.title;
            Object.assign(iframe.style, { position: 'fixed', top: 0, bottom: 0, left: 0, right: 0, border: 'none', width: '100%', height: '100%' });
            iframe.src = url;
            doc.body.appendChild(iframe);
            window.location.replace("https://google.com");
        }
    </script>
</body>
</html>
