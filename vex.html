<!DOCTYPE html>
<html>
<head>
    <title>Google Docs</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; background: #222; border: 4px solid #444; margin: 20px auto; }
        .ui { position: absolute; top: 10px; width: 100%; text-align: center; pointer-events: none; }
    </style>
</head>
<body>
    <div class="ui">
        <h1>VEX MINI MODULE</h1>
        <p>WASD / Arrows to Move | R to Reset</p>
    </div>
    <canvas id="g"></canvas>

<script>
    const canvas = document.getElementById("g");
    const ctx = canvas.getContext("2d");
    canvas.width = 800; canvas.height = 500;

    let player = { x: 50, y: 400, w: 20, h: 35, vx: 0, vy: 0, grounded: false };
    let gravity = 0.8;
    let friction = 0.8;

    // Level Layout (Platforms and Spikes)
    let platforms = [
        { x: 0, y: 480, w: 800, h: 20 }, // Floor
        { x: 150, y: 400, w: 100, h: 10 },
        { x: 300, y: 320, w: 100, h: 10 },
        { x: 450, y: 240, w: 100, h: 10 },
        { x: 600, y: 160, w: 100, h: 10 },
        { x: 0, y: 120, w: 150, h: 10 }
    ];

    let spikes = [
        { x: 320, y: 310, w: 20, h: 10 },
        { x: 470, y: 230, w: 20, h: 10 },
        { x: 50, y: 110, w: 20, h: 10 }
    ];

    let keys = {};
    window.onkeydown = (e) => { keys[e.code] = true; if(e.code == 'KeyR') reset(); };
    window.onkeyup = (e) => { keys[e.code] = false; };

    function reset() { player.x = 50; player.y = 400; player.vx = 0; player.vy = 0; }

    function update() {
        if (keys['ArrowRight'] || keys['KeyD']) player.vx += 1;
        if (keys['ArrowLeft'] || keys['KeyA']) player.vx -= 1;
        if ((keys['ArrowUp'] || keys['KeyW'] || keys['Space']) && player.grounded) {
            player.vy = -14;
            player.grounded = false;
        }

        player.vy += gravity;
        player.vx *= friction;
        player.x += player.vx;
        player.y += player.vy;

        player.grounded = false;
        
        // Platform Collision
        platforms.forEach(p => {
            if (player.x < p.x + p.w && player.x + player.w > p.x &&
                player.y < p.y + p.h && player.y + player.h > p.y) {
                if (player.vy > 0) {
                    player.y = p.y - player.h;
                    player.vy = 0;
                    player.grounded = true;
                }
            }
        });

        // Spike Collision
        spikes.forEach(s => {
            if (player.x < s.x + s.w && player.x + player.w > s.x &&
                player.y < s.y + s.h && player.y + player.h > s.y) {
                reset();
            }
        });

        if (player.y > 600) reset();
        draw();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Player (Stickman)
        ctx.strokeStyle = "#4CAF50"; ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(player.x + 10, player.y + 7, 7, 0, Math.PI * 2); // Head
        ctx.moveTo(player.x + 10, player.y + 14); ctx.lineTo(player.x + 10, player.y + 28); // Body
        ctx.moveTo(player.x, player.y + 18); ctx.lineTo(player.x + 20, player.y + 18); // Arms
        ctx.moveTo(player.x + 10, player.y + 28); ctx.lineTo(player.x, player.y + 40); // Leg 1
        ctx.moveTo(player.x + 10, player.y + 28); ctx.lineTo(player.x + 20, player.y + 40); // Leg 2
        ctx.stroke();

        // Draw Platforms
        ctx.fillStyle = "#555";
        platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

        // Draw Spikes
        ctx.fillStyle = "#f44336";
        spikes.forEach(s => {
            ctx.beginPath();
            ctx.moveTo(s.x, s.y + s.h);
            ctx.lineTo(s.x + s.w / 2, s.y);
            ctx.lineTo(s.x + s.w, s.y + s.h);
            ctx.fill();
        });
    }

    setInterval(update, 1000 / 60);

    // Tab Cloak and Panic Key
    setInterval(() => { document.title = "Google Docs"; }, 100);
    document.addEventListener('keydown', (e) => { 
        if(e.key === "Escape") window.location.replace("https://classroom.google.com"); 
    });
</script>
</body>
</html>
